name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.26", "1.25"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -v -coverprofile=coverage.out ./...

      - name: Check coverage threshold
        run: |
          coverage=$(go tool cover -func=coverage.out | awk '/total:/ {gsub("%", "", $3); print $3}')
          echo "Coverage is $coverage%"
          if [ "$(echo "$coverage < 80" | bc -l)" -eq 1 ]; then
            echo "::error::Code coverage ($coverage%) is below the required 80%."
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.go-version }}
          path: coverage.out

      - name: Build
        run: go build -o api-server ./cmd/api

  lint:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.26", "1.25"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install golangci-lint (build with runner Go)
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Run golangci-lint
        run: |
          golangci-lint --version
          golangci-lint run --config=.golangci.yml --out-format=colored-line-number

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: product-catalog:${{ github.sha }}

      - name: Scan Docker image with Trivy (JSON)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: product-catalog:${{ github.sha }}
          scan-type: image
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH

      - name: Scan Docker image with Trivy (Table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: product-catalog:${{ github.sha }}
          scan-type: image
          format: table
          severity: CRITICAL,HIGH

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-ubuntu-latest-1.26
          path: .

      - name: Run SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@aecaf43ae57e412bd97d70ef9ce6076e672fe0a9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: .
          args: >
            -Dsonar.go.coverage.reportPaths=coverage.out
