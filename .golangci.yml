# golangci-lint configuration
# Reference: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    # TODO: Enable additional linters:
    # - gofmt
    # - gocyclo
    # - misspell
    # - gocritic

linters-settings:
  errcheck:
    check-type-assertions: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
